<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staliaus saugumo testas</title>

<style>
body{
    font-family: Arial;
    max-width:800px;
    margin:auto;
    padding:20px;
}
.card{
    border:1px solid #ccc;
    padding:20px;
    border-radius:10px;
}
button{
    padding:10px 15px;
    font-size:16px;
    margin-top:10px;
    cursor:pointer;
}
#result{
    font-size:22px;
    font-weight:bold;
    margin-top:20px;
}
</style>
</head>

<body>

<h2>Staliaus saugumo testas</h2>

<div class="card">
    <div id="question"></div>
    <div id="answers"></div>
    <button onclick="next()">Kitas</button>
</div>

<div id="result"></div>

<script>

// -------------------- KLAUSIMAI --------------------
const allQuestions = [
{
q:"Ką reikia dėvėti dirbant su įrankiais?",
a:["Specialią aprangą","Sportinius drabužius","Palaidus rūbus","Bet ką"],
c:0
},
{
q:"Kokie batai privalomi dirbtuvėse?",
a:["Šlepetės","Tvirti neslystantys batai","Basutės","Kojinės"],
c:1
},
{
q:"Ką daryti su ilgais plaukais?",
a:["Palikti laisvus","Surišti","Nukirpti","Paslėpti rankovėse"],
c:1
},
{
q:"Kada naudoti apsauginius akinius?",
a:["Niekada","Dirbant su skiedromis ir dulkėmis","Tik lauke","Tik namie"],
c:1
},
{
q:"Kada naudojamas respiratorius?",
a:["Valgant","Šlifuojant ar pjaunant","Vaikštant","Miegant"],
c:1
},
{
q:"Kada negalima mūvėti pirštinių?",
a:["Dirbant su besisukančiais įrenginiais","Šluojant","Nešant lentas","Valant"],
c:0
},
{
q:"Kaip reikia dirbti?",
a:["Skubant","Ramiai ir neskubant","Bėgant","Triukšmaujant"],
c:1
},
{
q:"Ar galima dirbti pavargus?",
a:["Taip","Ne","Tik kartais","Tik ryte"],
c:1
},
{
q:"Ką reikia padaryti prieš pradedant darbą?",
a:["Nieko","Apgalvoti eigą","Bėgti prie įrankių","Įjungti viską"],
c:1
},
{
q:"Kaip elgtis su įrankiais?",
a:["Negadinti","Mėtyti","Skolinti bet kam","Slėpti"],
c:0
},
{
q:"Ką daryti su atšipusiu įrankiu?",
a:["Toliau naudoti","Pagaląsti arba pakeisti","Mesti į sieną","Ignoruoti"],
c:1
},
{
q:"Kaip tvirtinti medieną?",
a:["Rankomis","Spaustuvais","Kojomis","Laikant ore"],
c:1
},
{
q:"Ar galima dirbti vienam su staklėmis?",
a:["Taip","Ne","Kartais","Tik mokytojui leidus"],
c:1
},
{
q:"Ką daryti pastebėjus gedimą?",
a:["Ignoruoti","Pranešti mokytojui","Slėpti","Tęsti darbą"],
c:1
},
{
q:"Kada reikia ištraukti elektros kištuką?",
a:["Prieš valant įrankį","Niekada","Po darbo","Tik ryte"],
c:0
},
{
q:"Ar galima naudoti pažeistus laidus?",
a:["Taip","Ne","Kartais","Jei skuba"],
c:1
},
{
q:"Ar galima rūkyti dirbtuvėse?",
a:["Taip","Ne","Tik lauke","Tik per pertrauką"],
c:1
},
{
q:"Ką daryti su pjuvenomis?",
a:["Palikti","Reguliariai valyti","Slėpti","Užpilti vandeniu"],
c:1
},
{
q:"Ką reikia žinoti dirbtuvėse?",
a:["Kur gesintuvas","Filmo laiką","Muziką","Telefonų numerius"],
c:0
},
{
q:"Ką daryti nelaimės atveju?",
a:["Bėgti","Informuoti mokytoją","Slėptis","Nieko"],
c:1
}
];

// -------------------- MAIŠYMAS --------------------
function shuffle(arr){
    return arr.sort(()=>Math.random()-0.5);
}

let questions = shuffle([...allQuestions]).slice(0,20);

let current = 0;
let mistakes = 0;

// -------------------- RODYMAS --------------------
function show(){
    let q = questions[current];

    document.getElementById("question").innerHTML =
        `<b>${current+1}. ${q.q}</b>`;

    let answers = shuffle(q.a.map((a,i)=>({text:a,index:i})));

    let html = "";
    answers.forEach(ans=>{
        html += `<label>
        <input type="radio" name="ans" value="${ans.index}">
        ${ans.text}
        </label><br>`;
    });

    document.getElementById("answers").innerHTML = html;
}

show();

// -------------------- KITA --------------------
function next(){

let selected = document.querySelector('input[name="ans"]:checked');

if(!selected) return;

let q = questions[current];

if(Number(selected.value) !== q.c){
    mistakes++;
}

current++;

if(current >= questions.length){
    finish();
}else{
    show();
}
}

// -------------------- PABAIGA --------------------
function finish(){

document.querySelector(".card").style.display="none";

if(mistakes <= 2){
    document.getElementById("result").innerHTML =
    "✅ IŠLAIKEI";
}else{
    document.getElementById("result").innerHTML =
    "❌ NEIŠLAIKEI";
}

}

</script>

</body>
</html>
